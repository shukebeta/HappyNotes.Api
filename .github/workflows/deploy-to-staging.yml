name: Deploy to the staging env

# Controls when the workflow will run
on:
  # Triggers the workflow on push request event for master and feature branches
  push:
    branches:
      - master
      - 'feature/**'
  # Allows manual triggering from the Actions tab
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

      # Framework-dependent publish: the staging host already has the .NET 10
      # runtime installed, so we ship portable IL (no --self-contained / --runtime).
      - name: Publish and replace placeholders
        run: |
          set -ex
          dotnet publish src/HappyNotes.Api/HappyNotes.Api.csproj \
            --configuration Release --no-build --output ./publish
          APPSETTINGS=./publish/appsettings.json
          sed -i "s/password-placeholder/${{ secrets.STAGING_MYSQL_PASSWORD }}/g" "$APPSETTINGS"
          sed -i "s/symmetric-security-key-placeholder/${{ secrets.STAGING_SYMMETRIC_SECURITY_KEY }}/g" "$APPSETTINGS"
          COMMIT_HASH=$(git rev-parse --short HEAD)
          BUILD_DATE=$(date '+%Y-%b-%d')
          VERSION_INFO="$COMMIT_HASH ($BUILD_DATE)"
          sed -i "s/VERSION_PLACEHOLDER/$VERSION_INFO/" "$APPSETTINGS"
          sed -i "s/default_mysql_server/127.0.0.1/" "$APPSETTINGS"
          sed -i "s/default_manticore_server/sydney.shukebeta.eu.org/" "$APPSETTINGS"
          sed -i "s/seq-api-key-placeholder/${{ secrets.STAGING_SEQ_API_KEY }}/g" "$APPSETTINGS"
          sed -i $'s@seq-server-url-placeholder@'${{ secrets.STAGING_SEQ_SERVER_URL }}'@g' "$APPSETTINGS"
          sed -i 's@redis-connection-placeholder@arm.shukebeta.eu.org:6380@g' "$APPSETTINGS"
          echo 'Placeholders replaced.'

      # Stop the service and clean the deploy directory so stale files (e.g. the
      # old self-contained runtime) don't linger after switching to framework-dependent.
      - name: Stop service and clean deploy directory
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            export XDG_RUNTIME_DIR=/run/user/$(id -u)
            systemctl --user stop HappyNotes.Api.service || true
            rm -rf "${{ secrets.DEPLOY_PATH }}"/*
            mkdir -p "${{ secrets.DEPLOY_PATH }}"

      - name: Copy files to staging host
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          source: "publish/*"
          target: ${{ secrets.DEPLOY_PATH }}
          strip_components: 1

      - name: Install user systemd unit and restart service
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            set -e
            export XDG_RUNTIME_DIR=/run/user/$(id -u)
            # Keep the per-user systemd manager alive without an active login session.
            loginctl enable-linger "$USER" || true
            # Resolve the dotnet runtime. On the arm host it lives at ~/dotnet/dotnet
            # (no dot); also try the dotnet-install location and PATH / common system paths.
            DOTNET_BIN=""
            for c in "$HOME/dotnet/dotnet" "$HOME/.dotnet/dotnet" "$(command -v dotnet || true)" /usr/bin/dotnet /usr/share/dotnet/dotnet; do
              if [ -n "$c" ] && [ -x "$c" ]; then DOTNET_BIN="$c"; break; fi
            done
            if [ -z "$DOTNET_BIN" ]; then echo "dotnet runtime not found on host" >&2; exit 1; fi
            echo "Using dotnet at: $DOTNET_BIN"
            mkdir -p "$HOME/.config/systemd/user"
            printf "%s\n" \
              "[Unit]" \
              "Description=HappyNotes.Api" \
              "After=network.target" \
              "" \
              "[Service]" \
              "Type=simple" \
              "WorkingDirectory=${{ secrets.DEPLOY_PATH }}" \
              "ExecStart=$DOTNET_BIN ${{ secrets.DEPLOY_PATH }}/HappyNotes.Api.dll --urls \"http://127.0.0.1:5012\"" \
              "Restart=always" \
              "RestartSec=10" \
              "KillSignal=SIGINT" \
              "SyslogIdentifier=happy-notes-api-log" \
              "Environment=ASPNETCORE_ENVIRONMENT=Staging" \
              "Environment=DOTNET_PRINT_TELEMETRY_MESSAGE=false" \
              "" \
              "[Install]" \
              "WantedBy=default.target" > "$HOME/.config/systemd/user/HappyNotes.Api.service"
            systemctl --user daemon-reload
            systemctl --user enable HappyNotes.Api.service
            systemctl --user restart HappyNotes.Api.service
            sleep 3
            systemctl --user status HappyNotes.Api.service --no-pager || true
